<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feuerwehr TM – Lernapp</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;600&display=swap');

  :root {
    --red: #CC1111;
    --red-dark: #990000;
    --red-light: #FF2222;
    --black: #0A0A0A;
    --dark: #141414;
    --panel: #1C1C1C;
    --border: #2A2A2A;
    --text: #E8E8E8;
    --muted: #888;
    --correct: #22CC66; /* Grün */
    --wrong: #CC2222;   /* Rot */
    --accent: #FF6600;  /* Orange */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--black);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
  }

  /* Header & Stats-Ecke */
  header {
    background: var(--red-dark);
    padding: 15px 25px;
    border-bottom: 3px solid var(--red-light);
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 { font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; font-size: 1.5rem; color: #fff; }

  .corner-stats {
    text-align: right;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    line-height: 1.2;
    background: rgba(0,0,0,0.4);
    padding: 8px 12px;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .corner-stats div { display: flex; justify-content: space-between; gap: 15px; }
  .stat-r { color: var(--correct); font-weight: bold; }
  .stat-f { color: var(--wrong); font-weight: bold; }
  .stat-o { color: var(--accent); font-weight: bold; }

  /* Navigation */
  .nav-tabs {
    display: flex;
    background: var(--dark);
    padding: 0 20px;
    border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    padding: 12px 20px;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-weight: 600;
    text-transform: uppercase;
    font-size: 0.75rem;
    letter-spacing: 1px;
    transition: 0.2s;
  }
  .tab-btn.active { color: var(--red-light); border-bottom: 2px solid var(--red-light); }

  main { padding: 20px; max-width: 800px; margin: 0 auto; }

  /* Quiz Karte */
  .quiz-card {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 25px;
    border-radius: 4px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }

  .q-meta { display: flex; justify-content: space-between; color: var(--muted); font-size: 0.75rem; margin-bottom: 15px; }
  .q-text { font-size: 1.15rem; font-weight: 500; margin-bottom: 25px; line-height: 1.4; color: #fff; }

  /* Antwort-Optionen */
  .options { display: grid; gap: 12px; }
  .option {
    background: var(--dark);
    border: 1px solid var(--border);
    padding: 15px;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 15px;
    transition: 0.2s;
    font-size: 0.95rem;
  }
  .option:hover { border-color: #555; background: #1a1a1a; }

  /* Die Checkbox / Das Häkchen */
  .checkbox {
    width: 22px; height: 22px; 
    border: 2px solid var(--border);
    border-radius: 4px; 
    flex-shrink: 0; 
    display: flex; 
    align-items: center; 
    justify-content: center;
    transition: all 0.2s;
    background: transparent;
  }

  /* Zustand: Ausgewählt (beim Klicken) */
  .option.selected { border-color: var(--accent); background: rgba(255, 102, 0, 0.05); }
  .option.selected .checkbox { background: var(--accent); border-color: var(--accent); }
  .option.selected .checkbox::after {
    content: ''; width: 5px; height: 10px; border: solid white;
    border-width: 0 2px 2px 0; transform: rotate(45deg); margin-bottom: 2px;
  }

  /* Zustand: RICHTIG (nach Prüfung) -> HÄKCHEN WIRD GRÜN */
  .option.reveal .checkbox { 
    background: var(--correct) !important; 
    border-color: var(--correct) !important; 
  }
  .option.reveal .checkbox::after {
    content: ''; width: 5px; height: 10px; border: solid white;
    border-width: 0 2px 2px 0; transform: rotate(45deg); margin-bottom: 2px;
    display: block !important; /* Zeige Häkchen immer bei richtigen Antworten */
  }
  .option.reveal { border-color: var(--correct); }

  /* Zustand: FALSCH (nach Prüfung) */
  .option.wrong .checkbox { 
    background: var(--wrong) !important; 
    border-color: var(--wrong) !important; 
  }
  .option.wrong { border-color: var(--wrong); }

  /* Buttons */
  .actions { margin-top: 25px; display: flex; gap: 12px; flex-wrap: wrap; }
  .btn {
    padding: 12px 24px; border: none; border-radius: 3px;
    font-weight: 600; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px;
    transition: 0.2s;
  }
  .btn-primary { background: var(--red); color: white; }
  .btn-primary:hover { background: var(--red-light); }
  .btn-secondary { background: var(--border); color: var(--text); }
  .btn-secondary:hover { background: #3a3a3a; }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Übersicht Grid */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap: 8px; margin-top: 20px; }
  .grid-item {
    aspect-ratio: 1; background: var(--panel); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; cursor: pointer; border-radius: 3px; transition: 0.2s;
  }
  .grid-item.correct { background: var(--correct); color: black; border-color: var(--correct); }
  .grid-item.wrong { background: var(--wrong); color: white; border-color: var(--wrong); }
  .grid-item.active { border: 2px solid var(--accent); transform: scale(1.1); }

  .hidden { display: none; }
</style>
</head>
<body>

<header>
  <h1>Truppmann Ausbildung</h1>
  <div class="corner-stats">
    <div><span>Richtig:</span><span id="stat-r" class="stat-r">0</span></div>
    <div><span>Falsch:</span><span id="stat-f" class="stat-f">0</span></div>
    <div><span>Offen:</span><span id="stat-o" class="stat-o">164</span></div>
  </div>
</header>

<nav class="nav-tabs">
  <button id="tab-quiz" class="tab-btn active" onclick="switchTab('quiz')">Quiz</button>
  <button id="tab-overview" class="tab-btn" onclick="switchTab('overview')">Übersicht</button>
</nav>

<main>
  <div id="quiz-view">
    <div class="actions" style="margin-bottom: 20px; margin-top: 0;">
        <button class="btn btn-secondary" onclick="toggleRandom()">🔀 Zufall: <span id="random-status">AUS</span></button>
        <button class="btn btn-secondary" onclick="resetProgress()">🗑️ Fortschritt löschen</button>
    </div>

    <div id="card-container" class="quiz-card">
      <div class="q-meta">
        <span id="q-cat">Kategorie</span>
        <span id="q-progress">Frage 1 / 164</span>
      </div>
      <div id="q-text" class="q-text">Lade Frage...</div>
      <div id="options" class="options"></div>
      
      <div class="actions">
        <button id="btn-check" class="btn btn-primary" onclick="checkAnswer()">Prüfen</button>
        <button id="btn-next" class="btn btn-secondary hidden" onclick="nextQuestion()">Nächste Frage</button>
      </div>
    </div>
  </div>

  <div id="overview-view" class="hidden">
    <h2 style="font-family: 'Bebas Neue'; letter-spacing: 1px; margin-bottom: 10px;">Fragenübersicht</h2>
    <div id="overview-grid" class="grid"></div>
  </div>
</main>

// --- APP LOGIK ---
let quizOrder = allQuestions.map((_, i) => i);
let currentIdx = 0;
let selectedIndices = new Set();
let answered = JSON.parse(localStorage.getItem('tm_answered') || '{}');
let isRandom = false;

function init() {
  updateStats();
  renderQuestion();
}

function updateStats() {
  const values = Object.values(answered);
  const correct = values.filter(v => v === 'correct').length;
  const wrong = values.filter(v => v === 'wrong').length;
  const total = allQuestions.length;
  
  document.getElementById('stat-r').innerText = correct;
  document.getElementById('stat-f').innerText = wrong;
  document.getElementById('stat-o').innerText = Math.max(0, total - (correct + wrong));
}

function renderQuestion() {
  const qIdx = quizOrder[currentIdx];
  const q = allQuestions[qIdx];
  
  document.getElementById('q-cat').innerText = q.cat;
  document.getElementById('q-progress').innerText = `Frage ${currentIdx + 1} / ${allQuestions.length} (ID: ${q.id})`;
  document.getElementById('q-text').innerText = q.q;
  
  const optContainer = document.getElementById('options');
  optContainer.innerHTML = '';
  selectedIndices.clear();
  
  q.opts.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option';
    div.innerHTML = `<div class="checkbox"></div><span>${opt}</span>`;
    div.onclick = () => selectOption(i, div);
    optContainer.appendChild(div);
  });

  document.getElementById('btn-check').classList.remove('hidden');
  document.getElementById('btn-next').classList.add('hidden');
}

function selectOption(idx, el) {
  if(!document.getElementById('btn-next').classList.contains('hidden')) return; // Sperren nach Prüfung
  if(selectedIndices.has(idx)) {
    selectedIndices.delete(idx);
    el.classList.remove('selected');
  } else {
    selectedIndices.add(idx);
    el.classList.add('selected');
  }
}

function checkAnswer() {
  const q = allQuestions[quizOrder[currentIdx]];
  const options = document.querySelectorAll('.option');
  
  let isCorrect = true;
  
  q.opts.forEach((_, i) => {
    const shouldBeSelected = q.correct.includes(i);
    const isSelected = selectedIndices.has(i);
    
    // Visuelles Feedback
    if(shouldBeSelected) {
      options[i].classList.add('reveal'); // Wird GRÜN
      if(!isSelected) isCorrect = false;   // Fehlende Antwort -> falsch
    } else if(isSelected) {
      options[i].classList.add('wrong');  // Falsch gewählt -> ROT
      isCorrect = false;
    }
  });

  answered[q.id] = isCorrect ? 'correct' : 'wrong';
  localStorage.setItem('tm_answered', JSON.stringify(answered));
  updateStats();

  document.getElementById('btn-check').classList.add('hidden');
  document.getElementById('btn-next').classList.remove('hidden');
}

function nextQuestion() {
  if(currentIdx < quizOrder.length - 1) {
    currentIdx++;
    renderQuestion();
  } else {
    alert("Durchgang beendet!");
  }
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  if(tab === 'quiz') {
    document.getElementById('quiz-view').classList.remove('hidden');
    document.getElementById('overview-view').classList.add('hidden');
  } else {
    document.getElementById('quiz-view').classList.add('hidden');
    document.getElementById('overview-view').classList.remove('hidden');
    renderOverview();
  }
}

function toggleRandom() {
  isRandom = !isRandom;
  document.getElementById('random-status').innerText = isRandom ? "AN" : "AUS";
  if(isRandom) {
    quizOrder.sort(() => Math.random() - 0.5);
  } else {
    quizOrder = allQuestions.map((_, i) => i);
  }
  currentIdx = 0;
  renderQuestion();
}

function renderOverview() {
  const grid = document.getElementById('overview-grid');
  grid.innerHTML = '';
  allQuestions.forEach((q, i) => {
    const item = document.createElement('div');
    item.className = 'grid-item';
    if(answered[q.id]) item.classList.add(answered[q.id]);
    item.innerText = q.id;
    item.onclick = () => {
      currentIdx = quizOrder.indexOf(i);
      switchTab('quiz');
      renderQuestion();
    };
    grid.appendChild(item);
  });
}

function resetProgress() {
  if(confirm("Alle Ergebnisse löschen?")) {
    answered = {};
    localStorage.removeItem('tm_answered');
    updateStats();
    renderQuestion();
  }
}

init();
</script>
</body>
</html>
